<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind Card</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/main.css" />
  </head>
  <body class="bg-gray-100">
    <div
      class="product-card flex flex-col items-center bg-white shadow-lg rounded-lg p-6 max-w-sm mx-auto"
    >
      <div class="product-details">
        <h2 class="product-title">Product Name</h2>
        <p class="product-description">Product description goes here.</p>
        <p class="product-price">$19.99</p>

        <button class="btn-primary">Comprar</button>
      </div>
    </div>
  </body>
</html>

<!-- Ejercicio 3 CSS - Tarjetas de Producto con Tailwind
Objetivo
Crear un card de producto usando únicamente classes de Tailwind CSS. 
El diseño a tu gusto, pero que no sea muy complicado -->
